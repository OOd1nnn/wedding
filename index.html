<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Марта & Максим</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #05050a;
  color: white;
  overflow-x: hidden;
}

/* INTRO */
.intro {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#05050a;
  z-index:20;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  transition: 1s ease;
}

.intro.hidden {
  opacity:0;
  pointer-events:none;
}

.intro h1 {
  font-family: 'Playfair Display';
  font-size: 42px;
  margin-bottom: 20px;
}

.intro button {
  padding: 12px 24px;
  border-radius: 30px;
  border:none;
  background:white;
  color:black;
  font-size:14px;
  cursor:pointer;
  transition: 0.3s;
}

.intro button:hover {
  transform: scale(1.05);
}

/* canvas */
#canvas {
  position: fixed;
  top:0;
  left:0;
  z-index:0;
}

/* контент */
.content {
  position: relative;
  z-index: 2;
}

.section {
  height: 100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.block {
  background: rgba(255,255,255,0.06);
  padding: 40px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
}

h1.main {
  font-family: 'Playfair Display';
  font-size: 60px;
}

/* таймер */
#countdown,
#countdown-hours,
#countdown-minutes,
#countdown-seconds {
  margin-top: 5px;
  opacity: 0.85;
}

#countdown { font-size: 22px; }
#countdown-hours { font-size: 18px; }
#countdown-minutes { font-size: 16px; }
#countdown-seconds { font-size: 14px; }

/* сцена */
.fade {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  opacity:0;
  transition: 0.6s;
  z-index:4;
}

.fade.active { opacity:1; }

.scene2 {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#f3efe8;
  color:#222;
  z-index:6;
  opacity:0;
  pointer-events:none;
  transition: 0.6s;
  padding:40px 20px;
}

.scene2.active {
  opacity:1;
  pointer-events:auto;
}

.cards {
  max-width:900px;
  margin:auto;
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  justify-content:center;
}

.card {
  background:white;
  padding:20px;
  border-radius:20px;
  width:280px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.back {
  position:fixed;
  top:20px;
  left:20px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="intro" id="intro">
  <h1>Марта & Максим</h1>
  <button onclick="startExperience()">Tap to begin ✨</button>
</div>

<canvas id="canvas"></canvas>
<div class="fade" id="fade"></div>

<div class="content">
  <div class="section">
    <div>
      <h1 class="main">Марта & Максим</h1>
      <p>17 июля 2027</p>

      <div id="countdown"></div>
      <div id="countdown-hours"></div>
      <div id="countdown-minutes"></div>
      <div id="countdown-seconds"></div>
    </div>
  </div>

  <div class="section">
    <div class="block">Всё началось с одного взгляда</div>
  </div>

  <div class="section">
    <div class="block">Мы нашли друг друга</div>
  </div>

  <div class="section">
    <div class="block">И хотим разделить этот день с вами</div>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let w,h;

function resize(){
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

/* ⭐ звезды с мерцанием */
let stars = [];
for (let i = 0; i < 150; i++) {
  stars.push({
    x: Math.random() * w,
    y: Math.random() * h,
    size: Math.random() * 2,
    depth: Math.random() * 3 + 1,
    phase: Math.random() * Math.PI * 2,
    speed: 0.02 + Math.random() * 0.02
  });
}

let mouse = { x: 0, y: 0 };

window.addEventListener('mousemove', e => {
  mouse.x = (e.clientX / w - 0.5);
  mouse.y = (e.clientY / h - 0.5);
});

/* START */
function startExperience(){
  document.getElementById('intro').classList.add('hidden');

  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {

    DeviceOrientationEvent.requestPermission()
      .then(state => {
        if (state === 'granted') startGyro();
      });

  } else {
    startGyro();
  }
}

function startGyro(){
  window.addEventListener('deviceorientation', e => {
    if (e.gamma && e.beta) {
      mouse.x = e.gamma / 30;
      mouse.y = e.beta / 30;
    }
  });
}

/* DRAW */
function draw(){
  ctx.clearRect(0,0,w,h);

  stars.forEach(s=>{
    s.phase += s.speed;

    const twinkle = (Math.sin(s.phase) + 1) / 2;

    const ox = mouse.x * s.depth * 10;
    const oy = mouse.y * s.depth * 10;

    ctx.globalAlpha = 0.3 + twinkle * 0.7;

    ctx.beginPath();
    ctx.arc(s.x + ox, s.y + oy, s.size, 0, Math.PI*2);
    ctx.fillStyle="white";
    ctx.fill();
  });

  ctx.globalAlpha = 1;

  requestAnimationFrame(draw);
}
draw();

/* таймер */
const elDays = document.getElementById('countdown');
const elHours = document.getElementById('countdown-hours');
const elMinutes = document.getElementById('countdown-minutes');
const elSeconds = document.getElementById('countdown-seconds');

const date = new Date('2027-07-17T00:00:00');

function update(){
  const diff = date - new Date();

  elDays.innerHTML = Math.floor(diff / 86400000) + " дней";
  elHours.innerHTML = Math.floor(diff / 3600000) + " часов";
  elMinutes.innerHTML = Math.floor(diff / 60000) + " минут";
  elSeconds.innerHTML = Math.floor(diff / 1000) + " секунд";
}

setInterval(update,1000);
update();
</script>

</body>
</html>
