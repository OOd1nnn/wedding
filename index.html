<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Марта & Максим</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #05050a;
  color: white;
  overflow-x: hidden;
}

/* INTRO */
.intro {
  position: fixed;
  inset:0;
  background:#05050a;
  z-index:20;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.intro.hidden {
  opacity:0;
  pointer-events:none;
  transition:1s;
}

.intro h1 {
  font-family: 'Playfair Display';
  font-size: 42px;
}

.intro button {
  margin-top:20px;
  padding: 12px 24px;
  border-radius: 30px;
  border:none;
  background:white;
  color:black;
  cursor:pointer;
}

/* canvas */
#canvas {
  position: fixed;
  inset:0;
  z-index:0;
}

/* контент */
.content {
  position: relative;
  z-index: 2;
}

.section {
  height: 100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.block {
  background: rgba(255,255,255,0.06);
  padding: 40px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
}

h1.main {
  font-family: 'Playfair Display';
  font-size: 60px;
}

/* сцена */
.fade {
  position: fixed;
  inset:0;
  background:black;
  opacity:0;
  transition:0.6s;
  z-index:4;
}
.fade.active { opacity:1; }

.scene2 {
  position: fixed;
  inset:0;
  background:#f3efe8;
  color:#222;
  z-index:6;
  opacity:0;
  pointer-events:none;
  transition:0.6s;
  padding:40px 20px;
}
.scene2.active {
  opacity:1;
  pointer-events:auto;
}

.back {
  position:fixed;
  top:20px;
  left:20px;
  cursor:pointer;
}

/* карточки */
.cards {
  max-width:1000px;
  margin:80px auto 0;
  display:flex;
  gap:30px;
  flex-wrap:wrap;
  justify-content:center;
}

.card {
  background:white;
  padding:25px;
  border-radius:20px;
  width:260px;
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
}
</style>
</head>

<body>

<div class="intro" id="intro">
  <h1>Марта & Максим</h1>
  <button onclick="startExperience()">Tap to begin ✨</button>
</div>

<canvas id="canvas"></canvas>
<div class="fade" id="fade"></div>

<div class="content">
  <div class="section">
    <div>
      <h1 class="main">Марта & Максим</h1>
      <p>17 июля 2027</p>

      <div id="countdown"></div>
      <div id="countdown-hours"></div>
      <div id="countdown-minutes"></div>
      <div id="countdown-seconds"></div>  
    </div>
  </div>

  <div class="section"><div class="block">Всё началось с одного взгляда</div></div>
  <div class="section"><div class="block">Мы нашли друг друга</div></div>
  <div class="section"><div class="block">И хотим разделить этот день с вами</div></div>
</div>

<div class="scene2" id="scene2">
  <div class="back" onclick="closeScene()">← назад</div>

  <div class="cards">
    <div class="card">
      <h2>Дата свадьбы</h2>
      <p>17 июля 2027</p>
    </div>

    <div class="card">
      <h2>План мероприятия</h2>
      <p>15:30 — сбор гостей</p>
      <p>16:00 — церемония</p>
      <p>18:30 — банкет</p>
    </div>

    <div class="card">
      <h2>Место</h2>
      <p>Моринское агроусадьба</p>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let w,h;
function resize(){
  w = canvas.width = innerWidth;
  h = canvas.height = innerHeight;
}
resize();
window.addEventListener('resize', resize);

/* ⭐ звезды */
let stars=[];
for(let i=0;i<120;i++){
  stars.push({
    x:Math.random()*w,
    y:Math.random()*h,
    size:Math.random()*2,
    depth:Math.random()*3,
    phase:Math.random()*Math.PI*2,
    speed:0.02+Math.random()*0.02
  });
}

/* ☄️ кометы */
let comets=[];
let particles=[];

/* 🧠 slow motion */
let timeScale = 1;
let slowTimer = 0;

function triggerSlowMo(){
  timeScale = 0.35;
  slowTimer = 0.8; // секунды
}

function createComet(){
  comets.push({
    x: Math.random()*w*0.7,
    y: -30,
    vx: 0.7,
    vy: 0.7,
    size:3,
    tail:120
  });
}

/* 💥 взрыв */
function explode(x,y){
  for(let i=0;i<60;i++){
    const a=Math.random()*Math.PI*2;
    const s=Math.random()*3;

    particles.push({
      x,y,
      vx:Math.cos(a)*s,
      vy:Math.sin(a)*s,
      life:1,
      decay:0.015
    });
  }
}

/* 🎯 клик */
function handleClick(x,y){
  for(let i=comets.length-1;i>=0;i--){
    const c=comets[i];
    const d=Math.hypot(x-c.x,y-c.y);

    if(d<40){
      triggerSlowMo();
      explode(c.x,c.y);
      comets.splice(i,1);
      openScene();
      break;
    }
  }
}

window.addEventListener('click',e=>handleClick(e.clientX,e.clientY));
window.addEventListener('touchstart',e=>{
  const t=e.touches[0];
  handleClick(t.clientX,t.clientY);
});

/* сцена */
function openScene(){
  document.getElementById('fade').classList.add('active');
  setTimeout(()=>{
    document.getElementById('scene2').classList.add('active');
  },500);
}

function closeScene(){
  document.getElementById('scene2').classList.remove('active');
  setTimeout(()=>{
    document.getElementById('fade').classList.remove('active');
  },300);
}

/* старт */
function startExperience(){
  document.getElementById('intro').classList.add('hidden');
}

/* мышь */
let mouse={x:0,y:0};
window.addEventListener('mousemove',e=>{
  mouse.x=(e.clientX/w-0.5);
  mouse.y=(e.clientY/h-0.5);
});

/* 🎨 draw */
function draw(){
  ctx.clearRect(0,0,w,h);

  /* slow-mo восстановление */
  if(slowTimer > 0){
    slowTimer -= 0.016;
    if(slowTimer <= 0){
      timeScale = 1;
    }
  }

  /* звезды */
  for(let s of stars){
    s.phase+=s.speed*timeScale;
    const tw=(Math.sin(s.phase)+1)/2;

    ctx.globalAlpha=0.3+tw*0.7;

    ctx.beginPath();
    ctx.arc(s.x+mouse.x*s.depth*10,s.y+mouse.y*s.depth*10,s.size,0,Math.PI*2);
    ctx.fillStyle="white";
    ctx.fill();
  }

  ctx.globalAlpha=1;

  /* кометы */
  for(let i=comets.length-1;i>=0;i--){
    const c=comets[i];

    ctx.beginPath();
    ctx.arc(c.x,c.y,c.size,0,Math.PI*2);
    ctx.fill();

    const g=ctx.createLinearGradient(c.x,c.y,c.x-c.vx*c.tail,c.y-c.vy*c.tail);
    g.addColorStop(0,"white");
    g.addColorStop(1,"transparent");

    ctx.strokeStyle=g;
    ctx.lineWidth=2;

    ctx.beginPath();
    ctx.moveTo(c.x,c.y);
    ctx.lineTo(c.x-c.vx*c.tail,c.y-c.vy*c.tail);
    ctx.stroke();

    c.x+=c.vx*timeScale;
    c.y+=c.vy*timeScale;

    if(c.y>h+50) comets.splice(i,1);
  }

  /* частицы */
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];

    ctx.globalAlpha=p.life;
    ctx.shadowBlur=20;
    ctx.shadowColor="white";

    ctx.beginPath();
    ctx.arc(p.x,p.y,2,0,Math.PI*2);
    ctx.fill();

    ctx.shadowBlur=0;

    p.x+=p.vx*timeScale;
    p.y+=p.vy*timeScale;
    p.life-=p.decay*timeScale;

    if(p.life<=0) particles.splice(i,1);
  }

  ctx.globalAlpha=1;

  requestAnimationFrame(draw);
}
draw();

/* запуск */
setInterval(()=>{
  if(Math.random()>0.5) createComet();
},3000);

/* таймер */
const elDays = document.getElementById('countdown');
const elHours = document.getElementById('countdown-hours');
const elMinutes = document.getElementById('countdown-minutes');
const elSeconds = document.getElementById('countdown-seconds');

const date = new Date('2027-07-17T00:00:00');

function update(){
  const diff = date - new Date();

  elDays.innerHTML = Math.floor(diff / 86400000) + " дней";
  elHours.innerHTML = Math.floor(diff / 3600000) + " часов";
  elMinutes.innerHTML = Math.floor(diff / 60000) + " минут";
  elSeconds.innerHTML = Math.floor(diff / 1000) + " секунд";
}

setInterval(update,1000);
update();
</script>

</body>
</html>
