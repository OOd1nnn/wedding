<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Марта & Максим</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #05050a;
  color: white;
}

/* intro */
.intro {
  position: fixed;
  inset: 0;
  background:#05050a;
  z-index:20;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.intro.hidden {
  opacity:0;
  pointer-events:none;
  transition:1s;
}

button {
  padding:12px 24px;
  border-radius:30px;
  border:none;
  cursor:pointer;
}

/* canvas */
#canvas {
  position: fixed;
  inset:0;
  z-index:0;
}

/* текст */
.section {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  z-index:2;
  position:relative;
}

h1 {
  font-family:'Playfair Display';
  font-size:60px;
}

/* вспышка */
.flash {
  position:fixed;
  inset:0;
  background:white;
  opacity:0;
  pointer-events:none;
  z-index:10;
  transition:0.3s;
}

.flash.active {
  opacity:0.8;
}
</style>
</head>

<body>

<div class="intro" id="intro">
  <h1>Марта & Максим</h1>
  <button onclick="start()">Tap to begin ✨</button>
</div>

<div class="flash" id="flash"></div>
<canvas id="canvas"></canvas>

<div class="section">
  <div>
    <h1>Марта & Максим</h1>
    <p>17 июля 2027</p>
    <div id="count"></div>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let w,h;
function resize(){
  w=canvas.width=innerWidth;
  h=canvas.height=innerHeight;
}
resize();
onresize=resize;

/* ⭐ звезды */
let stars=[];
for(let i=0;i<150;i++){
  stars.push({
    x:Math.random()*w,
    y:Math.random()*h,
    size:Math.random()*2,
    depth:Math.random()*3,
    phase:Math.random()*6
  });
}

/* ☄️ кометы */
let comets=[];
let particles=[];

/* slow motion */
let timeScale=1;

/* гироскоп */
let mouse={x:0,y:0};

function start(){
  document.getElementById('intro').classList.add('hidden');

  if(DeviceOrientationEvent?.requestPermission){
    DeviceOrientationEvent.requestPermission().then(r=>{
      if(r==='granted') enableGyro();
    });
  } else enableGyro();
}

function enableGyro(){
  addEventListener('deviceorientation',e=>{
    mouse.x=e.gamma/30;
    mouse.y=e.beta/30;
  });
}

addEventListener('mousemove',e=>{
  mouse.x=(e.clientX/w-0.5);
  mouse.y=(e.clientY/h-0.5);
});

/* создание кометы */
function createComet(){
  const angle=Math.PI/4;
  const speed=0.7;

  comets.push({
    x:Math.random()*w*0.6,
    y:-50,
    vx:Math.cos(angle)*speed,
    vy:Math.sin(angle)*speed,
    size:3,
    tail:150
  });
}

/* взрыв */
function explode(x,y){
  for(let i=0;i<40;i++){
    const a=Math.random()*Math.PI*2;
    const s=Math.random()*3;
    particles.push({
      x,y,
      vx:Math.cos(a)*s,
      vy:Math.sin(a)*s,
      life:1
    });
  }
}

/* распад */
function breakComet(c){
  for(let i=0;i<20;i++){
    particles.push({
      x:c.x,
      y:c.y,
      vx:(Math.random()-0.5)*2,
      vy:(Math.random()-0.5)*2,
      life:1
    });
  }
}

/* клик */
function click(x,y){
  comets.forEach((c,i)=>{
    const d=Math.hypot(x-c.x,y-c.y);

    if(d<60){
      explode(c.x,c.y);
      comets.splice(i,1);

      /* вспышка */
      const f=document.getElementById('flash');
      f.classList.add('active');
      setTimeout(()=>f.classList.remove('active'),200);

      /* slow motion */
      timeScale=0.2;
      setTimeout(()=>timeScale=1,600);
    }
  });
}

addEventListener('click',e=>click(e.clientX,e.clientY));
addEventListener('touchstart',e=>{
  const t=e.touches[0];
  click(t.clientX,t.clientY);
});

/* draw */
function draw(){
  ctx.clearRect(0,0,w,h);

  /* звезды */
  stars.forEach(s=>{
    s.phase+=0.02;

    const tw=(Math.sin(s.phase)+1)/2;
    const ox=mouse.x*s.depth*15;
    const oy=mouse.y*s.depth*15;

    ctx.globalAlpha=0.3+tw*0.7;
    ctx.beginPath();
    ctx.arc(s.x+ox,s.y+oy,s.size,0,6);
    ctx.fillStyle="white";
    ctx.fill();
  });
  ctx.globalAlpha=1;

  /* кометы */
  comets.forEach((c,i)=>{
    ctx.beginPath();
    ctx.arc(c.x,c.y,c.size,0,6);
    ctx.fillStyle="white";
    ctx.fill();

    const g=ctx.createLinearGradient(
      c.x,c.y,
      c.x-c.vx*c.tail,
      c.y-c.vy*c.tail
    );
    g.addColorStop(0,"white");
    g.addColorStop(1,"transparent");

    ctx.strokeStyle=g;
    ctx.lineWidth=2;

    ctx.beginPath();
    ctx.moveTo(c.x,c.y);
    ctx.lineTo(c.x-c.vx*c.tail,c.y-c.vy*c.tail);
    ctx.stroke();

    c.x+=c.vx*timeScale;
    c.y+=c.vy*timeScale;

    if(c.y>h*0.8){
      breakComet(c);
      comets.splice(i,1);
    }
  });

  /* частицы */
  particles.forEach((p,i)=>{
    ctx.globalAlpha=p.life;
    ctx.beginPath();
    ctx.arc(p.x,p.y,2,0,6);
    ctx.fillStyle="white";
    ctx.fill();

    p.x+=p.vx*timeScale;
    p.y+=p.vy*timeScale;
    p.vx*=0.98;
    p.vy*=0.98;
    p.life-=0.02;

    if(p.life<=0) particles.splice(i,1);
  });
  ctx.globalAlpha=1;

  requestAnimationFrame(draw);
}
draw();

/* генерация */
setInterval(()=>{
  if(Math.random()>0.4) createComet();
},3000);

/* таймер */
const el=document.getElementById('count');
const date=new Date('2027-07-17');

setInterval(()=>{
  const d=date-new Date();
  el.innerHTML=Math.floor(d/86400000)+" дней";
},1000);
</script>

</body>
</html>
