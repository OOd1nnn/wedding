<!-- ВЕСЬ ТВОЙ HTML ОСТАЕТСЯ БЕЗ ИЗМЕНЕНИЙ ДО SCRIPT -->

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let w,h;

function resize(){
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

/* ⭐ звезды */
let stars = [];
for (let i = 0; i < 150; i++) {
  stars.push({
    x: Math.random() * w,
    y: Math.random() * h,
    size: Math.random() * 2,
    depth: Math.random() * 3 + 1
  });
}

/* ☄️ КОМЕТЫ */
let comets = [];
let explosions = [];

/* создаем комету */
function createComet(){
  const angle = Math.PI / 4; // нормальный угол
  const speed = 0.6;

  comets.push({
    x: Math.random()*w*0.6,
    y: -50,
    vx: Math.cos(angle)*speed,
    vy: Math.sin(angle)*speed,
    size: 3,
    tail: 140
  });
}

/* 💥 взрыв */
function explode(x,y){
  for(let i=0;i<30;i++){
    const a = Math.random()*Math.PI*2;
    const s = Math.random()*2;

    explosions.push({
      x,
      y,
      vx: Math.cos(a)*s,
      vy: Math.sin(a)*s,
      life: 1
    });
  }
}

/* 🎯 клик */
function handleClick(x,y){
  comets.forEach((c,i)=>{
    const dist = Math.hypot(x - c.x, y - c.y);

    if(dist < 50){ // увеличенная зона
      explode(c.x,c.y);
      comets.splice(i,1);
      openScene();
    }
  });
}

window.addEventListener('click', e=>{
  handleClick(e.clientX, e.clientY);
});

window.addEventListener('touchstart', e=>{
  const t = e.touches[0];
  handleClick(t.clientX, t.clientY);
});

/* управление */
let mouse = { x: 0, y: 0 };

window.addEventListener('mousemove', e => {
  mouse.x = (e.clientX / w - 0.5);
  mouse.y = (e.clientY / h - 0.5);
});

/* гироскоп */
function startExperience(){
  document.getElementById('intro').classList.add('hidden');

  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {

    DeviceOrientationEvent.requestPermission()
      .then(state => {
        if (state === 'granted') startGyro();
      });

  } else {
    startGyro();
  }
}

function startGyro(){
  window.addEventListener('deviceorientation', e => {
    if (e.gamma && e.beta) {
      mouse.x = e.gamma / 30;
      mouse.y = e.beta / 30;
    }
  });
}

/* 🎬 сцена */
function openScene(){
  document.getElementById('fade').classList.add('active');
  setTimeout(()=>{
    document.getElementById('scene2').classList.add('active');
  },400);
}

function closeScene(){
  document.getElementById('scene2').classList.remove('active');
  setTimeout(()=>{
    document.getElementById('fade').classList.remove('active');
  },300);
}

/* 🎨 draw */
function draw(){
  ctx.clearRect(0,0,w,h);

  /* ⭐ звезды */
  stars.forEach(s=>{
    const ox = mouse.x * s.depth * 10;
    const oy = mouse.y * s.depth * 10;

    ctx.beginPath();
    ctx.arc(s.x + ox, s.y + oy, s.size, 0, Math.PI*2);
    ctx.fillStyle="white";
    ctx.fill();
  });

  /* ☄️ кометы */
  comets.forEach((c,i)=>{
    // ядро
    ctx.beginPath();
    ctx.arc(c.x, c.y, c.size, 0, Math.PI*2);
    ctx.fillStyle="white";
    ctx.fill();

    // хвост
    const grad = ctx.createLinearGradient(
      c.x, c.y,
      c.x - c.vx*c.tail,
      c.y - c.vy*c.tail
    );

    grad.addColorStop(0,"rgba(255,255,255,1)");
    grad.addColorStop(1,"rgba(255,255,255,0)");

    ctx.strokeStyle = grad;
    ctx.lineWidth = 2;

    ctx.beginPath();
    ctx.moveTo(c.x, c.y);
    ctx.lineTo(c.x - c.vx*c.tail, c.y - c.vy*c.tail);
    ctx.stroke();

    c.x += c.vx;
    c.y += c.vy;

    if(c.y > h + 100) comets.splice(i,1);
  });

  /* 💥 частицы */
  explosions.forEach((p,i)=>{
    ctx.globalAlpha = p.life;

    ctx.beginPath();
    ctx.arc(p.x, p.y, 2, 0, Math.PI*2);
    ctx.fillStyle="white";
    ctx.fill();

    p.x += p.vx;
    p.y += p.vy;

    p.vx *= 0.98;
    p.vy *= 0.98;
    p.life -= 0.02;

    if(p.life <= 0) explosions.splice(i,1);
  });

  ctx.globalAlpha = 1;

  requestAnimationFrame(draw);
}
draw();

/* запуск комет */
setInterval(()=>{
  if(Math.random() > 0.5) createComet();
},3000);

/* таймер */
const elDays = document.getElementById('countdown');
const elHours = document.getElementById('countdown-hours');
const elMinutes = document.getElementById('countdown-minutes');
const elSeconds = document.getElementById('countdown-seconds');

const date = new Date('2027-07-17T00:00:00');

function update(){
  const diff = date - new Date();

  elDays.innerHTML = Math.floor(diff / 86400000) + " дней";
  elHours.innerHTML = Math.floor(diff / 3600000) + " часов";
  elMinutes.innerHTML = Math.floor(diff / 60000) + " минут";
  elSeconds.innerHTML = Math.floor(diff / 1000) + " секунд";
}

setInterval(update,1000);
update();
</script>
