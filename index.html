<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Марта & Максим</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #05050a;
  color: white;
  overflow-x: hidden;
}

/* INTRO */
.intro {
  position: fixed;
  inset:0;
  background:#05050a;
  z-index:20;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.intro.hidden {
  opacity:0;
  pointer-events:none;
  transition:1s;
}

.intro button {
  padding:12px 24px;
  border-radius:30px;
  border:none;
  background:white;
  cursor:pointer;
}

/* canvas */
#canvas {
  position: fixed;
  inset:0;
  z-index:0;
}

/* контент */
.content {
  position: relative;
  z-index: 2;
}

.section {
  height: 100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.block {
  background: rgba(255,255,255,0.06);
  padding: 40px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
}

h1.main {
  font-family: 'Playfair Display';
  font-size: 60px;
}

/* таймер */
#countdown,
#countdown-hours,
#countdown-minutes,
#countdown-seconds {
  margin-top: 5px;
}

/* сцена */
.fade {
  position: fixed;
  inset:0;
  background:black;
  opacity:0;
  transition:0.6s;
  z-index:4;
}

.fade.active { opacity:1; }

.scene2 {
  position: fixed;
  inset:0;
  background:#f3efe8;
  color:#222;
  z-index:6;
  opacity:0;
  pointer-events:none;
  transition:0.6s;
  padding:40px 20px;
}

.scene2.active {
  opacity:1;
  pointer-events:auto;
}

.back {
  position:fixed;
  top:20px;
  left:20px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="intro" id="intro">
  <h1>Марта & Максим</h1>
  <button onclick="startExperience()">Tap to begin ✨</button>
</div>

<canvas id="canvas"></canvas>
<div class="fade" id="fade"></div>

<div class="content">
  <div class="section">
    <div>
      <h1 class="main">Марта & Максим</h1>
      <p>17 июля 2027</p>

      <div id="countdown"></div>
      <div id="countdown-hours"></div>
      <div id="countdown-minutes"></div>
      <div id="countdown-seconds"></div>
    </div>
  </div>
</div>

<div class="scene2" id="scene2">
  <div class="back" onclick="closeScene()">← назад</div>
  <h2 style="text-align:center;">Добро пожаловать 💫</h2>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let w,h;
function resize(){
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

/* ⭐ звезды */
let stars = [];
for (let i = 0; i < 120; i++) {
  stars.push({
    x: Math.random()*w,
    y: Math.random()*h,
    size: Math.random()*2,
    depth: Math.random()*3
  });
}

/* ☄️ кометы */
let comets = [];
let particles = [];

function createComet(){
  const angle = Math.PI/4;
  const speed = 0.7;

  comets.push({
    x: Math.random()*w*0.7,
    y: -20,
    vx: Math.cos(angle)*speed,
    vy: Math.sin(angle)*speed,
    size: 3,
    tail: 120
  });
}

/* 💥 взрыв */
function explode(x,y){
  for(let i=0;i<30;i++){
    const a = Math.random()*Math.PI*2;
    const s = Math.random()*2;

    particles.push({
      x,y,
      vx: Math.cos(a)*s,
      vy: Math.sin(a)*s,
      life:1
    });
  }
}

/* 🎯 клик */
function handleClick(x,y){
  for(let i=comets.length-1;i>=0;i--){
    const c = comets[i];
    const dist = Math.hypot(x-c.x,y-c.y);

    if(dist < 50){
      explode(c.x,c.y);
      comets.splice(i,1);
      openScene();
      break;
    }
  }
}

window.addEventListener('click', e=>{
  handleClick(e.clientX,e.clientY);
});

window.addEventListener('touchstart', e=>{
  const t = e.touches[0];
  handleClick(t.clientX,t.clientY);
});

/* 🎬 сцена */
function openScene(){
  document.getElementById('fade').classList.add('active');
  setTimeout(()=>{
    document.getElementById('scene2').classList.add('active');
  },400);
}

function closeScene(){
  document.getElementById('scene2').classList.remove('active');
  setTimeout(()=>{
    document.getElementById('fade').classList.remove('active');
  },300);
}

/* управление */
let mouse={x:0,y:0};

window.addEventListener('mousemove',e=>{
  mouse.x=(e.clientX/w-0.5);
  mouse.y=(e.clientY/h-0.5);
});

/* draw */
function draw(){
  ctx.clearRect(0,0,w,h);

  /* звезды */
  stars.forEach(s=>{
    const ox = mouse.x*s.depth*10;
    const oy = mouse.y*s.depth*10;

    ctx.beginPath();
    ctx.arc(s.x+ox,s.y+oy,s.size,0,Math.PI*2);
    ctx.fillStyle="white";
    ctx.fill();
  });

  /* кометы */
  for(let i=comets.length-1;i>=0;i--){
    const c = comets[i];

    ctx.beginPath();
    ctx.arc(c.x,c.y,c.size,0,Math.PI*2);
    ctx.fill();

    const grad = ctx.createLinearGradient(
      c.x,c.y,
      c.x-c.vx*c.tail,
      c.y-c.vy*c.tail
    );

    grad.addColorStop(0,"white");
    grad.addColorStop(1,"transparent");

    ctx.strokeStyle=grad;
    ctx.lineWidth=2;

    ctx.beginPath();
    ctx.moveTo(c.x,c.y);
    ctx.lineTo(c.x-c.vx*c.tail,c.y-c.vy*c.tail);
    ctx.stroke();

    c.x+=c.vx;
    c.y+=c.vy;

    if(c.y>h+50) comets.splice(i,1);
  }

  /* частицы */
  for(let i=particles.length-1;i>=0;i--){
    const p = particles[i];

    ctx.globalAlpha = p.life;
    ctx.beginPath();
    ctx.arc(p.x,p.y,2,0,Math.PI*2);
    ctx.fill();

    p.x+=p.vx;
    p.y+=p.vy;

    p.vx*=0.98;
    p.vy*=0.98;
    p.life-=0.02;

    if(p.life<=0) particles.splice(i,1);
  }

  ctx.globalAlpha=1;

  requestAnimationFrame(draw);
}
draw();

/* запуск */
setInterval(()=>{
  if(Math.random()>0.5) createComet();
},3000);

/* таймер */
const elDays = document.getElementById('countdown');
const elHours = document.getElementById('countdown-hours');
const elMinutes = document.getElementById('countdown-minutes');
const elSeconds = document.getElementById('countdown-seconds');

const date = new Date('2027-07-17T00:00:00');

function update(){
  const diff = date - new Date();

  elDays.innerHTML = Math.floor(diff / 86400000) + " дней";
  elHours.innerHTML = Math.floor(diff / 3600000) + " часов";
  elMinutes.innerHTML = Math.floor(diff / 60000) + " минут";
  elSeconds.innerHTML = Math.floor(diff / 1000) + " секунд";
}

setInterval(update,1000);
update();
</script>

</body>
</html>
